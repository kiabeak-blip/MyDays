workflows:
  ios-release:
    name: MyDays - iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - mydays_ios  # All credentials: App Store Connect API + certificate + Firebase plist
      vars:
        BUNDLE_ID: com.hararhotels.mydays
        APP_NAME: MyDays
      flutter: stable
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Set up keychain
        script: keychain initialize

      - name: Fetch App Store signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Write GoogleService-Info.plist
        script: |
          echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode \
            > "$CM_BUILD_DIR/ios/Runner/GoogleService-Info.plist"

      - name: Set up code signing settings
        script: xcode-project use-profiles

      - name: Get Flutter packages
        script: flutter packages pub get

      - name: Generate launcher icons
        script: flutter pub run flutter_launcher_icons

      - name: Build iOS IPA
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$(($(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID") + 1)) \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      email:
        recipients:
          - hararhrb@harar-hotels.com
        notify:
          success: true
          failure: true
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
